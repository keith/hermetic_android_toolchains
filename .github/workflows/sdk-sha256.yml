name: SDK SHA256

on:
  pull_request:
    paths:
      - sdk/versions.json
  push:
    branches:
      - main
    paths:
      - sdk/versions.json

env:
  BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
  USE_BAZEL_VERSION: "9.x"

jobs:
  sdk_sha256:
    name: SDK SHA256
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Test
        shell: bash
        run: bazel test --config=buildbuddy-ci ${BUILDBUDDY_API_KEY:+--remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY} //tests:sdk_versions_sha256_test
