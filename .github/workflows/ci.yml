name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}

jobs:
  pre_commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - uses: pre-commit/action@v3.0.1

  bazel_lowest_supported:
    name: Bazel lowest supported version (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      USE_BAZEL_VERSION: "8.4.2"
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      - name: Test
        shell: bash
        run: bazel test --config=buildbuddy-ci ${BUILDBUDDY_API_KEY:+--remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY} //...

  bazel_8:
    name: Bazel 8.x (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      USE_BAZEL_VERSION: "8.x"
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      - name: Test
        shell: bash
        run: bazel test --config=buildbuddy-ci ${BUILDBUDDY_API_KEY:+--remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY} //...

  bazel_9:
    name: Bazel 9.x (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      USE_BAZEL_VERSION: "9.x"
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      - name: Test
        shell: bash
        run: bazel test --config=buildbuddy-ci ${BUILDBUDDY_API_KEY:+--remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY} //...

      - name: Verify MODULE.bazel.lock is unchanged
        if: always()
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain -- MODULE.bazel.lock)" ]]; then
            git diff -- MODULE.bazel.lock
            git diff --cached -- MODULE.bazel.lock
            echo "::error file=MODULE.bazel.lock::MODULE.bazel.lock changed during CI. Run Bazel locally and commit the updated lockfile."
            exit 1
          fi

  bazel_latest:
    name: Bazel latest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      USE_BAZEL_VERSION: latest
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      - name: Test
        shell: bash
        run: bazel test --config=buildbuddy-ci ${BUILDBUDDY_API_KEY:+--remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY} //...

  bazel_rolling:
    name: Bazel rolling (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      USE_BAZEL_VERSION: rolling
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      - name: Test
        shell: bash
        run: bazel test --config=buildbuddy-ci ${BUILDBUDDY_API_KEY:+--remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY} //...

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs:
      - pre_commit
      - bazel_lowest_supported
      - bazel_8
      - bazel_9
      - bazel_latest
      - bazel_rolling
    if: ${{ always() }}

    steps:
      - name: Check Bazel jobs
        shell: bash
        env:
          PRE_COMMIT_RESULT: ${{ needs.pre_commit.result }}
          BAZEL_LOWEST_SUPPORTED_RESULT: ${{ needs.bazel_lowest_supported.result }}
          BAZEL_8_RESULT: ${{ needs.bazel_8.result }}
          BAZEL_9_RESULT: ${{ needs.bazel_9.result }}
          BAZEL_LATEST_RESULT: ${{ needs.bazel_latest.result }}
          BAZEL_ROLLING_RESULT: ${{ needs.bazel_rolling.result }}
        run: |
          echo "pre-commit: ${PRE_COMMIT_RESULT}"
          echo "Bazel 8.4.2: ${BAZEL_LOWEST_SUPPORTED_RESULT}"
          echo "Bazel 8.x: ${BAZEL_8_RESULT}"
          echo "Bazel 9.x: ${BAZEL_9_RESULT}"
          echo "Bazel latest: ${BAZEL_LATEST_RESULT}"
          echo "Bazel rolling: ${BAZEL_ROLLING_RESULT}"

          if [[ "${PRE_COMMIT_RESULT}" != "success" || \
                "${BAZEL_LOWEST_SUPPORTED_RESULT}" != "success" || \
                "${BAZEL_8_RESULT}" != "success" || \
                "${BAZEL_9_RESULT}" != "success" || \
                "${BAZEL_LATEST_RESULT}" != "success" || \
                "${BAZEL_ROLLING_RESULT}" != "success" ]]; then
            exit 1
          fi
