name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}

jobs:
  bazel_8:
    name: Bazel 8.x (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      USE_BAZEL_VERSION: "8.x"
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      - name: Test
        shell: bash
        run: bazel test --config=buildbuddy-ci ${BUILDBUDDY_API_KEY:+--remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY} //...

  bazel_9:
    name: Bazel 9.x (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      USE_BAZEL_VERSION: "9.x"
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      - name: Test
        shell: bash
        run: bazel test --config=buildbuddy-ci ${BUILDBUDDY_API_KEY:+--remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY} //...

  bazel_latest:
    name: Bazel latest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      USE_BAZEL_VERSION: latest
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      - name: Test
        shell: bash
        run: bazel test --config=buildbuddy-ci ${BUILDBUDDY_API_KEY:+--remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY} //...

  bazel_rolling:
    name: Bazel rolling (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      USE_BAZEL_VERSION: rolling
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      - name: Test
        shell: bash
        run: bazel test --config=buildbuddy-ci ${BUILDBUDDY_API_KEY:+--remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY} //...

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs:
      - bazel_8
      - bazel_9
      - bazel_latest
      - bazel_rolling
    if: ${{ always() }}

    steps:
      - name: Check Bazel jobs
        shell: bash
        env:
          BAZEL_8_RESULT: ${{ needs.bazel_8.result }}
          BAZEL_9_RESULT: ${{ needs.bazel_9.result }}
          BAZEL_LATEST_RESULT: ${{ needs.bazel_latest.result }}
          BAZEL_ROLLING_RESULT: ${{ needs.bazel_rolling.result }}
        run: |
          echo "Bazel 8.x: ${BAZEL_8_RESULT}"
          echo "Bazel 9.x: ${BAZEL_9_RESULT}"
          echo "Bazel latest: ${BAZEL_LATEST_RESULT}"
          echo "Bazel rolling: ${BAZEL_ROLLING_RESULT}"

          if [[ "${BAZEL_8_RESULT}" != "success" || \
                "${BAZEL_9_RESULT}" != "success" || \
                "${BAZEL_LATEST_RESULT}" != "success" || \
                "${BAZEL_ROLLING_RESULT}" != "success" ]]; then
            exit 1
          fi
